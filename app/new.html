<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav>
  <button class="active" onclick="showPage('dashboard')">Dashboard</button>
  <button onclick="showPage('add')">Add</button>
  <button onclick="showPage('history')">History</button>
</nav>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">
  <h2>Overview</h2>
  <div class="cards">
    <div class="card full">
      <label>Balance</label>
      <div class="amount balance" id="balance">₹0.00</div>
    </div>
    <div class="card">
      <label>Income</label>
      <div class="amount income" id="total-income">₹0.00</div>
    </div>
    <div class="card">
      <label>Expenses</label>
      <div class="amount expense" id="total-expense">₹0.00</div>
    </div>
  </div>

  <h2 class="cat-heading">By Category</h2>
  <div class="cat-list" id="cat-list">
    <div class="empty">No expenses yet.</div>
  </div>
</div>

<!-- ADD -->
<div id="add" class="page">
  <h2>Add Transaction</h2>

  <div class="form-group">
    <label>Type</label>
    <div class="type-toggle">
      <button id="btn-expense" class="selected-expense" onclick="selectType('expense')">Expense</button>
      <button id="btn-income" onclick="selectType('income')">Income</button>
    </div>
  </div>

  <div class="form-group">
    <label>Description</label>
    <input type="text" id="desc" placeholder="e.g. Grocery run" />
  </div>

  <div class="form-group">
    <label>Amount (₹)</label>
    <input type="number" id="amount" placeholder="0.00" min="0" step="0.01" />
  </div>

  <div class="form-group">
    <label>Category</label>
    <select id="category">
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Bills</option>
      <option>Health</option>
      <option>Entertainment</option>
      <option>Salary</option>
      <option>Other</option>
    </select>
  </div>

  <div class="form-group">
    <label>Date</label>
    <input type="date" id="date" />
  </div>

  <button class="btn-add" onclick="addTransaction()">Add Transaction</button>
</div>

<!-- HISTORY -->
<div id="history" class="page">
  <h2>History</h2>
  <div class="filter-row">
    <select id="filter-type" onchange="renderHistory()">
      <option value="all">All Types</option>
      <option value="income">Income</option>
      <option value="expense">Expense</option>
    </select>
    <select id="filter-cat" onchange="renderHistory()">
      <option value="all">All Categories</option>
      <option>Food</option>
      <option>Transport</option>
      <option>Shopping</option>
      <option>Bills</option>
      <option>Health</option>
      <option>Entertainment</option>
      <option>Salary</option>
      <option>Other</option>
    </select>
  </div>
  <div class="tx-list" id="tx-list"></div>
</div>

<script src="app.js"></script>
</body>
</html>

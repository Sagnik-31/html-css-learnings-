<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css variables</title>
    <style>
        :root{ /* root element for setting values */
            --color: rgb(223, 21, 21);
            --seccolor: blue;
            --defpad: 25px;
        }

        .container{
            padding: var(--defpad);
            background-color: var(--seccolor);

        }

        ul li{
        color: var(--color)
        }
    </style>
</head>
<body>

    <div class="container">
<ul>
    <li>Home</li>
    <li>About us</li>
    <li>Contact us</li>
</ul>
</div>
    
</body>
</html>

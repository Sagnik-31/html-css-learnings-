<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  .container {
  display: grid;
  grid-template-columns: repeat(3, 1fr); 
  gap: 20px;  
  width: 80%;
  margin: auto;
}

.box {
  background-color: #2eab20;
  padding: 40px;
  text-align: center;
  font-size: 24px;
  color: rgb(242, 245, 241);
  border-radius: 10px;
}

</style>
</head>

<body>

<h1> Hi guys this is a basic example of css grid</h1>
 <div class="container">
  <div class="box">1</div>
  <div class="box">2</div>
  <div class="box">3</div>
  <div class="box">4</div>
  <div class="box">5</div>
  <div class="box">6</div>
</div>


</body>
</html>
